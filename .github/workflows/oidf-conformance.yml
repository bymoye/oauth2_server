name: oidf-conformance

on:
  workflow_dispatch:

jobs:
  oidf-conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      CONFORMANCE_SERVER: ${{ vars.OIDF_CONFORMANCE_SERVER || 'https://www.certification.openid.net/' }}
      OIDF_REF: ${{ vars.OIDF_CONFORMANCE_SUITE_REF || 'master' }}
      PLAN_EXPRESSION: ${{ vars.OIDF_PLAN_EXPRESSION || '' }}
      EXPORT_RESULTS: ${{ vars.OIDF_EXPORT_RESULTS || 'true' }}
      VERBOSE: ${{ vars.OIDF_VERBOSE || 'true' }}
      DISABLE_SSL_VERIFY: ${{ vars.OIDF_DISABLE_SSL_VERIFY || 'false' }}
      NO_PARALLEL: ${{ vars.OIDF_NO_PARALLEL || 'true' }}
      RUN_TIMEOUT_SECONDS: ${{ vars.OIDF_RUN_TIMEOUT_SECONDS || '10800' }}
      MONITOR_INTERVAL_SECONDS: ${{ vars.OIDF_MONITOR_INTERVAL_SECONDS || '60' }}
      RERUN: ${{ vars.OIDF_RERUN || '' }}
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Clone official conformance suite
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "$OIDF_REF" https://gitlab.com/openid/conformance-suite.git oidf-conformance-suite

      - name: Install official runner dependencies
        run: python -m pip install --upgrade -r oidf-conformance-suite/scripts/requirements.txt

      - name: Write OIDF plan config
        run: |
          set -euo pipefail
          python scripts/materialize_oidf_plan_config.py \
            --template docs/conformance/oidf-plan-config-template.json \
            --output oidf-plan-configs.json
        env:
          OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_01: ${{ secrets.OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_01 }}
          OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_02: ${{ secrets.OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_02 }}
          OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_03: ${{ secrets.OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_03 }}
          OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_04: ${{ secrets.OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_04 }}
          OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_05: ${{ secrets.OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_05 }}
          OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_06: ${{ secrets.OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_06 }}
          OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_07: ${{ secrets.OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_07 }}
          OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_08: ${{ secrets.OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_08 }}
          OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_09: ${{ secrets.OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_09 }}
          OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_10: ${{ secrets.OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_10 }}
          OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_11: ${{ secrets.OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_11 }}
          OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_12: ${{ secrets.OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_12 }}
          OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_13: ${{ secrets.OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_13 }}
          OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_14: ${{ secrets.OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_14 }}
          OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_15: ${{ secrets.OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_15 }}
          OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_16: ${{ secrets.OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_16 }}
          OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_17: ${{ secrets.OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_17 }}
          OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_18: ${{ secrets.OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_18 }}
          OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_19: ${{ secrets.OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_19 }}
          OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_20: ${{ secrets.OIDF_PLAN_CONFIG_SECRET_PATCH_GZ_B64_20 }}

      - name: Run OIDF conformance plan
        run: |
          set -euo pipefail
          args=(
            --suite-dir oidf-conformance-suite
            --conformance-server "$CONFORMANCE_SERVER"
            --plan-expression "$PLAN_EXPRESSION"
            --config-json-file oidf-plan-configs.json
            --timeout-seconds "$RUN_TIMEOUT_SECONDS"
            --monitor-interval-seconds "$MONITOR_INTERVAL_SECONDS"
          )
          if [ "$EXPORT_RESULTS" = "true" ]; then
            args+=(--export-dir "$GITHUB_WORKSPACE/oidf-results")
          fi
          if [ "$VERBOSE" = "true" ]; then
            args+=(--verbose)
          fi
          if [ "$DISABLE_SSL_VERIFY" = "true" ]; then
            args+=(--disable-ssl-verify)
          fi
          if [ "$NO_PARALLEL" = "true" ]; then
            args+=(--no-parallel)
          fi
          if [ -n "$RERUN" ]; then
            args+=(--rerun "$RERUN")
          fi
          python -u scripts/run_oidf_conformance.py "${args[@]}"
        env:
          OIDF_CONFORMANCE_TOKEN: ${{ secrets.OIDF_CONFORMANCE_TOKEN }}
          OIDF_PLAN_SET_JSON: ${{ vars.OIDF_PLAN_SET_JSON }}

      - name: Upload OIDF result archive
        if: always() && vars.OIDF_EXPORT_RESULTS != 'false'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: oidf-conformance-results
          path: oidf-results
          if-no-files-found: ignore
